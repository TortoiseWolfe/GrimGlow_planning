[sdxl_arguments]
cache_text_encoder_outputs = true

[model_arguments]
pretrained_model_name_or_path = "/checkpoints/sd_xl_base_1.0.safetensors"

[dataset_arguments]
# Multi-character dataset with per-image captions
[dataset_arguments.datasets]

[[dataset_arguments.datasets.subsets]]
image_dir = "/dataset/grimglow_sable"
num_repeats = 20

[[dataset_arguments.datasets.subsets]]
image_dir = "/dataset/grimglow_wren"
num_repeats = 20

[[dataset_arguments.datasets.subsets]]
image_dir = "/dataset/grimglow_jink"
num_repeats = 20

[[dataset_arguments.datasets.subsets]]
image_dir = "/dataset/grimglow_thresh"
num_repeats = 20

[[dataset_arguments.datasets.subsets]]
image_dir = "/dataset/grimglow_luma"
num_repeats = 20

[[dataset_arguments.datasets.subsets]]
image_dir = "/dataset/grimglow_theodore"
num_repeats = 25

[training_arguments]
output_dir = "/output"
output_name = "grimglow_characters"
save_model_as = "safetensors"
max_train_steps = 3000
learning_rate = 1e-4
optimizer_type = "AdamW8bit"
mixed_precision = "fp16"
seed = 42
cache_latents = true
cache_latents_to_disk = true
gradient_checkpointing = true

[network_arguments]
network_module = "networks.lora"
network_dim = 32
network_alpha = 16
network_train_unet_only = true

[other_arguments]
resolution = "768,768"
train_batch_size = 1
