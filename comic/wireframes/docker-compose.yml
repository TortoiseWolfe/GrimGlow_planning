services:
  viewer:
    image: node:22-bookworm-slim
    init: true
    ports:
      - "3001:3001"
    volumes:
      - .:/app:ro
    working_dir: /app
    command: npx live-server --port=3001 --host=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
