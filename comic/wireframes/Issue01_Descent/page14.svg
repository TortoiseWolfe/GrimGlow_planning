<text x="417.0" y="529.5" font-size="11.0" fill="#333333">Can it be rebuilt?</text>
<rect x="411.0" y="548.5" width="350.8" height="68.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="516.2,616.5 524.2,616.5 513.2,624.5" fill="white" stroke="#c87533" stroke-width="0.8"/>
<line x1="515.7" y1="616.5" x2="524.7" y2="616.5" stroke="white" stroke-width="1.5"/>
<text x="417.0" y="565.5" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="417.0" y="579.5" font-size="11.0" fill="#333333">With the right components. Nothing we have. I'll need to</text>
<text x="417.0" y="593.5" font-size="11.0" fill="#333333">source equivalent parts from whatever technology exists</text>
<text x="417.0" y="607.5" font-size="11.0" fill="#333333">here.</text>
<rect x="411.0" y="626.5" width="151.2" height="40.0" rx="6" fill="white" stroke="#b0b0b0" stroke-width="1.0" opacity="0.92"/>
