<text x="41.0" y="515.5" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="529.5" font-size="11.0" fill="#333333">Here's where we are. The temporal drive core is intact --</text>
<text x="41.0" y="543.5" font-size="11.0" fill="#333333">that's the one good piece. The drive assembly that makes it</text>
<text x="41.0" y="557.5" font-size="11.0" fill="#333333">functional is destroyed. The navigation array is gone.</text>
<text x="41.0" y="571.5" font-size="11.0" fill="#333333">Communications are gone. Power distribution is severed.</text>
<text x="41.0" y="585.5" font-size="11.0" fill="#333333">Half the hull is in pieces I haven't found yet.</text>
<rect x="35.0" y="604.5" width="354.0" height="54.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="141.2,658.5 149.2,658.5 138.2,666.5" fill="white" stroke="#c87533" stroke-width="0.8"/>
<line x1="140.7" y1="658.5" x2="149.7" y2="658.5" stroke="white" stroke-width="1.5"/>
<text x="41.0" y="621.5" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="635.5" font-size="11.0" fill="#333333">We're not flying out of here tonight. We're not flying out</text>
<text x="41.0" y="649.5" font-size="11.0" fill="#333333">of here this month.</text>
<text x="383.0" y="506.5" text-anchor="end" font-size="12" font-weight="bold" fill="#888888" opacity="0.6">2</text>
