<line x1="455.8" y1="666.5" x2="464.8" y2="666.5" stroke="white" stroke-width="1.5"/>
<text x="417.0" y="643.5" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="417.0" y="657.5" font-size="11.0" fill="#333333">Then that's what we do.</text>
