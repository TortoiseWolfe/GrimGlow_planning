<text x="41.0" y="84.0" font-size="11.0" fill="#2e8b57" font-weight="700">JINK</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">We're on a rooftop in what looks like a major city -- dense, industrial, goes on for miles. Big river to the south, maybe</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">half a mile. There's a church with a tall spire two blocks southeast. I saw gas lighting, horse-drawn vehicles, chimneys</text>
<text x="41.0" y="126.0" font-size="11.0" fill="#333333">everywhere.</text>
<rect x="504.9" y="145.0" width="260.1" height="40.0" rx="6" fill="white" stroke="#b0b0b0" stroke-width="1.0" opacity="0.92"/>
<polygon points="583.0,185.0 591.0,185.0 580.0,193.0" fill="white" stroke="#b0b0b0" stroke-width="0.8"/>
<line x1="582.5" y1="185.0" x2="591.5" y2="185.0" stroke="white" stroke-width="1.5"/>
<text x="510.9" y="162.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="510.9" y="176.0" font-size="11.0" fill="#333333">Any sign of the other wreckage fragments?</text>
<rect x="35.0" y="195.0" width="730.0" height="40.0" rx="6" fill="white" stroke="#2e8b57" stroke-width="1.0" opacity="0.92"/>
<polygon points="254.0,235.0 262.0,235.0 251.0,243.0" fill="white" stroke="#2e8b57" stroke-width="0.8"/>
<line x1="253.5" y1="235.0" x2="262.5" y2="235.0" stroke="white" stroke-width="1.5"/>
<text x="41.0" y="212.0" font-size="11.0" fill="#2e8b57" font-weight="700">JINK</text>
<text x="41.0" y="226.0" font-size="11.0" fill="#333333">Scattered. I saw at least two impact points within a few blocks. One in what looks like a courtyard. One I couldn't identify.</text>
<text x="759.0" y="75.0" text-anchor="end" font-size="12" font-weight="bold" fill="#888888" opacity="0.6">1</text>
<text x="765.0" y="474.5" text-anchor="end" font-size="9" fill="#888888" opacity="0.5">MW</text>
