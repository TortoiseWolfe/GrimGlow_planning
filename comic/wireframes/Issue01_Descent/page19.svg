<text x="417.0" y="472.0" font-size="11.0" fill="#333333">I'll need Wren's power draw projections. And environmental</text>
<text x="417.0" y="486.0" font-size="11.0" fill="#333333">baselines for this era — atmosphere, pathogens, water</text>
<text x="417.0" y="500.0" font-size="11.0" fill="#333333">composition. We don't know what's safe to breathe</text>
<text x="417.0" y="514.0" font-size="11.0" fill="#333333">long-term.</text>
