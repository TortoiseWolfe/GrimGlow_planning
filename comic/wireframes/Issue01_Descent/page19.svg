<text x="41.0" y="550.0" font-size="11.0" fill="#333333">Precision gears. Optical lenses. Copper induction coils. A</text>
<text x="41.0" y="564.0" font-size="11.0" fill="#333333">crystalline resonance medium.&quot; *(the list is growing)*</text>
