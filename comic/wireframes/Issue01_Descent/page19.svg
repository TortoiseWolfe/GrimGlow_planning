<text x="41.0" y="472.0" font-size="11.0" fill="#333333">If we can't rebuild the drive, we build a new one.</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">Different architecture. I need to source components</text>
<text x="41.0" y="500.0" font-size="11.0" fill="#333333">locally.</text>
