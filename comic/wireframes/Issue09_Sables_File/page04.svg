<text x="41.0" y="543.5" font-size="11.0" fill="#333333">juncture. I know operatives were sent before us. I don't</text>
<text x="41.0" y="557.5" font-size="11.0" fill="#333333">know what we were supposed to do. The specifics are gone.</text>
