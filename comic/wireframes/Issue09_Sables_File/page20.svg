<text x="41.0" y="84.0" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">There was a fairy queen, she said, who ruled a kingdom of light and reason. And the queen sent her finest knights on a great</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">quest — across a dark sea, to a land the knights had never known.</text>
