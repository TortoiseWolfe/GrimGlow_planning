<text x="41.0" y="774.5" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="41.0" y="788.5" font-size="11.0" fill="#333333">And the knights searched that land for the riddle's answer. They asked the trees and the rivers and the creatures of the</text>
<text x="41.0" y="802.5" font-size="11.0" fill="#333333">wood. And the trees said: we do not know. And the rivers said: we have always been here. And the creatures said: the answer</text>
<text x="41.0" y="816.5" font-size="11.0" fill="#333333">is not something you find. It is something you become.</text>
