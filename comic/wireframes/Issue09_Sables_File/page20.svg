<text x="417.0" y="342.9" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="417.0" y="356.9" font-size="11.0" fill="#333333">The knights sailed for years. They fought storms and</text>
<text x="417.0" y="370.9" font-size="11.0" fill="#333333">serpents and the dark itself. And when they reached the far</text>
<text x="417.0" y="384.9" font-size="11.0" fill="#333333">shore, they found a land of wonder and terror in equal</text>
<text x="417.0" y="398.9" font-size="11.0" fill="#333333">measure.</text>
