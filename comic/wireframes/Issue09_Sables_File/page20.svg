<text x="41.0" y="342.9" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="41.0" y="356.9" font-size="11.0" fill="#333333">The queen told her knights: bring me the answer to the</text>
<text x="41.0" y="370.9" font-size="11.0" fill="#333333">riddle of the dark land. That is your quest. Solve the</text>
<text x="41.0" y="384.9" font-size="11.0" fill="#333333">riddle and return to me.</text>
