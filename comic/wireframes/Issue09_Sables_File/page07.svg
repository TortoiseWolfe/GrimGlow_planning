<text x="41.0" y="645.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="659.0" font-size="11.0" fill="#333333">The prior insertions. That is who was in the church. The</text>
<text x="41.0" y="673.0" font-size="11.0" fill="#333333">wing-pack. The dead data core. They were sent before us.</text>
<text x="41.0" y="687.0" font-size="11.0" fill="#333333">And they—</text>
