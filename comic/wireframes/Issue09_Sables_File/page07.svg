<text x="417.0" y="84.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="417.0" y="98.0" font-size="11.0" fill="#333333">To be clear. We were sent on an intervention mission. The</text>
<text x="417.0" y="112.0" font-size="11.0" fill="#333333">intervention specifics are destroyed. Sable knows it</text>
<text x="417.0" y="126.0" font-size="11.0" fill="#333333">matters. She does not know what 'it' is.</text>
