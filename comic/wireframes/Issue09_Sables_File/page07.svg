<text x="41.0" y="84.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">The operational specifics — what we were sent to do — were</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">stored here. This segment was destroyed in the crash. I</text>
<text x="41.0" y="126.0" font-size="11.0" fill="#333333">have spent eight weeks trying to reconstruct it. It is</text>
<text x="41.0" y="140.0" font-size="11.0" fill="#333333">gone.</text>
