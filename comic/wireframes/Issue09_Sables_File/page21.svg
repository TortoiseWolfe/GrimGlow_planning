<text x="41.0" y="84.0" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">And the eldest knight, she who had led them across the dark sea — she understood at last. She went to the fairy queen in a</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">dream and said: 'The riddle has no answer to bring back. The answer is that we are already where we must be. The quest was</text>
<text x="41.0" y="126.0" font-size="11.0" fill="#333333">not to find something and return. The quest was the staying.'</text>
