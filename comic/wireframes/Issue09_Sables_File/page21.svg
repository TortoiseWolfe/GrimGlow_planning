<text x="417.0" y="832.0" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="417.0" y="846.0" font-size="11.0" fill="#333333">I don't know why I thought of that one. Grandmother always</text>
<text x="417.0" y="860.0" font-size="11.0" fill="#333333">said it was her favorite. She said the best quests are the</text>
<text x="417.0" y="874.0" font-size="11.0" fill="#333333">ones where you're already home.</text>
