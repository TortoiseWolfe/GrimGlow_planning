<text x="41.0" y="84.0" font-size="11.0" fill="#2e8b57" font-weight="700">JINK</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">You managed us. That's what this was. Information control. Like we're assets to be deployed, not people who deserve to know</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">what they're dying for.</text>
<rect x="644.1" y="131.0" width="120.9" height="40.0" rx="6" fill="white" stroke="#b0b0b0" stroke-width="1.0" opacity="0.92"/>
<polygon points="680.4,171.0 688.4,171.0 677.4,179.0" fill="white" stroke="#b0b0b0" stroke-width="0.8"/>
<line x1="679.9" y1="171.0" x2="688.9" y2="171.0" stroke="white" stroke-width="1.5"/>
<text x="650.1" y="148.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="650.1" y="162.0" font-size="11.0" fill="#333333">You are not dying.</text>
<rect x="35.0" y="181.0" width="730.0" height="40.0" rx="6" fill="white" stroke="#2e8b57" stroke-width="1.0" opacity="0.92"/>
<polygon points="254.0,221.0 262.0,221.0 251.0,229.0" fill="white" stroke="#2e8b57" stroke-width="0.8"/>
<line x1="253.5" y1="221.0" x2="262.5" y2="221.0" stroke="white" stroke-width="1.5"/>
<text x="41.0" y="198.0" font-size="11.0" fill="#2e8b57" font-weight="700">JINK</text>
<text x="41.0" y="212.0" font-size="11.0" fill="#333333">We could have been! We nearly were! And you let us walk into that without the full picture because it was — what? Cleaner?</text>
<text x="759.0" y="75.0" text-anchor="end" font-size="12" font-weight="bold" fill="#888888" opacity="0.6">1</text>
<text x="765.0" y="417.0" text-anchor="end" font-size="9" fill="#888888" opacity="0.5">MW</text>
