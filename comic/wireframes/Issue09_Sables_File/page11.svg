<text x="41.0" y="457.0" font-size="10.0" fill="#2e8b57" font-weight="700">JINK</text>
<text x="41.0" y="470.0" font-size="10.0" fill="#333333">I defended you. When Thresh questioned</text>
<text x="41.0" y="483.0" font-size="10.0" fill="#333333">the Titan debrief, I said 'Sable has a</text>
<text x="41.0" y="496.0" font-size="10.0" fill="#333333">reason.' I said that.</text>
