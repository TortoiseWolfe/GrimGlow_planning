<text x="542.3" y="457.0" font-size="10.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="542.3" y="470.0" font-size="10.0" fill="#333333">The prior operatives were in the same</text>
<text x="542.3" y="483.0" font-size="10.0" fill="#333333">position. They knew about the</text>
<text x="542.3" y="496.0" font-size="10.0" fill="#333333">convergence. They knew about the mission.</text>
<text x="542.3" y="509.0" font-size="10.0" fill="#333333">And they chose to stay.</text>
<rect x="536.3" y="528.0" width="226.5" height="64.0" rx="6" fill="white" stroke="#6a5acd" stroke-width="1.0" opacity="0.92"/>
<polygon points="604.3,592.0 612.3,592.0 601.3,600.0" fill="white" stroke="#6a5acd" stroke-width="0.8"/>
<line x1="603.8" y1="592.0" x2="612.8" y2="592.0" stroke="white" stroke-width="1.5"/>
<text x="542.3" y="544.0" font-size="10.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="542.3" y="557.0" font-size="10.0" fill="#333333">The question is not what Sable hid. The</text>
<text x="542.3" y="570.0" font-size="10.0" fill="#333333">question is what those operatives</text>
<text x="542.3" y="583.0" font-size="10.0" fill="#333333">understood that we do not. Yet.</text>
