<polygon points="254.0,869.0 262.0,869.0 251.0,877.0" fill="white" stroke="#c87533" stroke-width="0.8"/>
<line x1="253.5" y1="869.0" x2="262.5" y2="869.0" stroke="white" stroke-width="1.5"/>
<text x="41.0" y="832.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="846.0" font-size="11.0" fill="#333333">Luma is right. The file is open. The argument about who knew what can wait. The question now is: does this information change</text>
<text x="41.0" y="860.0" font-size="11.0" fill="#333333">what we do tomorrow?</text>
<rect x="75.4" y="879.0" width="689.6" height="40.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="282.3,919.0 290.3,919.0 279.3,927.0" fill="white" stroke="#c87533" stroke-width="0.8"/>
<line x1="281.8" y1="919.0" x2="290.8" y2="919.0" stroke="white" stroke-width="1.5"/>
<text x="81.4" y="896.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="81.4" y="910.0" font-size="11.0" fill="#333333">We still need two components. The Titans are still active. Sable's file does not fix the drive. I fix the drive.</text>
