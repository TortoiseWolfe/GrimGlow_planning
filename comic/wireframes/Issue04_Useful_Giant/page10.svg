<text x="692.5" y="134.0" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="692.5" y="148.0" font-size="11.0" fill="#333333">Yes, ma'am.</text>
<rect x="35.0" y="167.0" width="647.2" height="40.0" rx="6" fill="white" stroke="#b0b0b0" stroke-width="1.0" opacity="0.92"/>
