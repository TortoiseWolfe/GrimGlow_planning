<text x="417.0" y="846.0" font-size="11.0" fill="#333333">He got the principle right. The execution is crude — coil</text>
<text x="417.0" y="860.0" font-size="11.0" fill="#333333">ratios are wrong, the brass is too impure to sustain clean</text>
<text x="417.0" y="874.0" font-size="11.0" fill="#333333">resonance.</text>
