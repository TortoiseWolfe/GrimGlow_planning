<text x="41.0" y="84.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">Three. We are not fairies. We are not magic. We are soldiers, stranded, trying to get home. You do not make us into a story.</text>
