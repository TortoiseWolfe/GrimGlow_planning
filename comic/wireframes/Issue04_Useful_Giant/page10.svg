<text x="41.0" y="198.0" font-size="11.0" fill="#333333">And understand this. If you compromise us — if you tell, or lead someone here, or put this squad at risk—</text>
<rect x="438.4" y="217.0" width="326.6" height="40.0" rx="6" fill="white" stroke="#b0b0b0" stroke-width="1.0" opacity="0.92"/>
