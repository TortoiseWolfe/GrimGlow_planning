<text x="41.0" y="84.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">The drive assembly requires specific components. Precision gears, copper induction coils, an optical lens, conductor wire.</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">Human technology, adapted.</text>
<rect x="323.4" y="131.0" width="441.6" height="40.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
