<text x="329.4" y="162.0" font-size="11.0" fill="#333333">You'd need to source them from workshops and factories across the city.</text>
<rect x="35.0" y="181.0" width="580.7" height="40.0" rx="6" fill="white" stroke="#c49a6c" stroke-width="1.0" opacity="0.92"/>
