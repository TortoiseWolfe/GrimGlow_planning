<text x="41.0" y="522.0" font-size="11.0" fill="#333333">He built a charging cradle from clockwork. Without understanding the power cell's</text>
<text x="41.0" y="536.0" font-size="11.0" fill="#333333">frequency modulation. He just... saw how it worked.</text>
