<text x="41.0" y="98.0" font-size="11.0" fill="#333333">Theodore. When you first saw Jink, you called them 'fair folk.' What does that mean to your people? What do your stories say</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">about beings like us?</text>
