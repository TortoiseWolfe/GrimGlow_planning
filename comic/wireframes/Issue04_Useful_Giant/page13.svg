<text x="41.0" y="472.0" font-size="11.0" fill="#333333">Well, fairies — the fair folk, the good neighbours, the gentle people — you never call them by their true name, see, or they</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">take offence—</text>
