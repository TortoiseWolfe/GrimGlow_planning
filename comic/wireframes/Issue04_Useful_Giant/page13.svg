<text x="41.0" y="522.0" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="41.0" y="536.0" font-size="11.0" fill="#333333">They live in hollow hills and under bridges and in the spaces between. They've got courts and kings and queens. Some are</text>
<text x="41.0" y="550.0" font-size="11.0" fill="#333333">kind, the Seelie sort. And some are...</text>
