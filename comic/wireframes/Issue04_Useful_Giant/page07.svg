<text x="41.0" y="184.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="198.0" font-size="11.0" fill="#333333">Three minutes and a full neural scan through the floorboards. His brain is still developing. The prefrontal cortex alone—</text>
