<text x="80.5" y="550.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="80.5" y="564.0" font-size="11.0" fill="#333333">I'm not talking about headaches. I'm talking about</text>
<text x="80.5" y="578.0" font-size="11.0" fill="#333333">language. Motor function. Self-recognition.</text>
