<text x="289.2" y="832.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="289.2" y="846.0" font-size="11.0" fill="#333333">We need copper induction coils from a telegraph station. A precision lens from a</text>
<text x="289.2" y="860.0" font-size="11.0" fill="#333333">lighthouse. Conductor wire from a foundry. And that's the SHORT list.</text>
<rect x="283.2" y="879.0" width="481.8" height="54.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="427.7,933.0 435.7,933.0 424.7,941.0" fill="white" stroke="#c87533" stroke-width="0.8"/>
<line x1="427.2" y1="933.0" x2="436.2" y2="933.0" stroke="white" stroke-width="1.5"/>
<text x="289.2" y="896.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="289.2" y="910.0" font-size="11.0" fill="#333333">Every item is behind a human door, on a human shelf, in a human building. We are</text>
<text x="289.2" y="924.0" font-size="11.0" fill="#333333">FOUR INCHES TALL.</text>
<rect x="283.2" y="943.0" width="229.8" height="40.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
