<text x="41.0" y="458.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="472.0" font-size="11.0" fill="#333333">His neural architecture isn't like ours. The modifier was</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">calibrated for our species. Applied to a human — to a</text>
<text x="41.0" y="500.0" font-size="11.0" fill="#333333">developing human brain — the risk of collateral erasure is</text>
<text x="41.0" y="514.0" font-size="11.0" fill="#333333">significant.</text>
