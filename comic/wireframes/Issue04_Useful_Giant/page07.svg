<text x="607.8" y="134.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="607.8" y="148.0" font-size="11.0" fill="#333333">You've had three minutes.</text>
<rect x="35.0" y="167.0" width="730.0" height="40.0" rx="6" fill="white" stroke="#6a5acd" stroke-width="1.0" opacity="0.92"/>
