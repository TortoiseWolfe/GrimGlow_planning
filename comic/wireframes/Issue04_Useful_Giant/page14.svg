<text x="50.2" y="148.0" font-size="11.0" fill="#333333">Oh, yes! Cold iron keeps them away — keeps you away, I</text>
<text x="50.2" y="162.0" font-size="11.0" fill="#333333">mean. Sorry. And you can't lie, fairies can't lie, and—</text>
