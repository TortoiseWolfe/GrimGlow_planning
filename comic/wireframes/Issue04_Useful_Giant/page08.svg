<text x="41.0" y="84.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">He is a civilian child. In a city full of people he talks</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">to. We put our survival in his hands and he tells one</text>
<text x="41.0" y="126.0" font-size="11.0" fill="#333333">friend — ONE — and we are done.</text>
<rect x="219.7" y="145.0" width="169.3" height="40.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="270.5,185.0 278.5,185.0 267.5,193.0" fill="white" stroke="#c87533" stroke-width="0.8"/>
