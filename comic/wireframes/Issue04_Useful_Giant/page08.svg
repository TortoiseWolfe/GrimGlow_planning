<text x="172.1" y="882.0" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="172.1" y="896.0" font-size="11.0" fill="#333333">I studied the piece — the shard Jink left. How the light moves inside it. The geometric patterns.</text>
