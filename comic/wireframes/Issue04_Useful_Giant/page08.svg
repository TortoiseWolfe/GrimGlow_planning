<text x="225.7" y="162.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="225.7" y="176.0" font-size="11.0" fill="#333333">He hasn't told anyone yet.</text>
<rect x="35.0" y="195.0" width="139.1" height="40.0" rx="6" fill="white" stroke="#b0b0b0" stroke-width="1.0" opacity="0.92"/>
