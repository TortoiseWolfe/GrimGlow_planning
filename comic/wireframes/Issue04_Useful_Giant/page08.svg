<text x="417.0" y="84.0" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="417.0" y="98.0" font-size="11.0" fill="#333333">Ma'am. I haven't told anyone. I won't.</text>
<rect x="468.6" y="117.0" width="296.4" height="40.0" rx="6" fill="white" stroke="#c49a6c" stroke-width="1.0" opacity="0.92"/>
