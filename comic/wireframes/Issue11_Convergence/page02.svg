<text x="542.3" y="470.0" font-size="10.0" fill="#333333">The anomalies I cataloged. The factory</text>
<text x="542.3" y="483.0" font-size="10.0" fill="#333333">worker who understood metallurgy. The</text>
<text x="542.3" y="496.0" font-size="10.0" fill="#333333">information shifts. It's all one</text>
<text x="542.3" y="509.0" font-size="10.0" fill="#333333">operation.</text>
