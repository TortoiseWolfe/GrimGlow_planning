<text x="41.0" y="832.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="846.0" font-size="11.0" fill="#333333">They're not changing one event. They're steering the entire industrial revolution. Every innovation that succeeds, every idea</text>
<text x="41.0" y="860.0" font-size="11.0" fill="#333333">that dies — they're selecting the future. Their future. Not ours.</text>
