<text x="41.0" y="84.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">The telegraph is the nervous system of the industrial age. Every business order, every news report, every government dispatch</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">flows through these lines. Control the information, and you control which ideas succeed.</text>
