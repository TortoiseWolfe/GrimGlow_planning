<text x="41.0" y="84.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">Fourteen devices I can confirm. Possibly more. Each one at a critical node in the telegraph network. They've been doing this</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">longer than we've been here.</text>
<text x="759.0" y="75.0" text-anchor="end" font-size="12" font-weight="bold" fill="#888888" opacity="0.6">1</text>
<text x="765.0" y="417.0" text-anchor="end" font-size="9" fill="#888888" opacity="0.5">WIDE</text>
