<text x="41.0" y="832.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="846.0" font-size="11.0" fill="#333333">Individually, yes. Each device can be disabled at its installation point. But they're networked. Single-point failure</text>
<text x="41.0" y="860.0" font-size="11.0" fill="#333333">triggers a failsafe — the other devices compensate and the network adapts.</text>
<rect x="329.5" y="879.0" width="435.5" height="40.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="460.1,919.0 468.1,919.0 457.1,927.0" fill="white" stroke="#c87533" stroke-width="0.8"/>
<line x1="459.6" y1="919.0" x2="468.6" y2="919.0" stroke="white" stroke-width="1.5"/>
<text x="335.5" y="896.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="335.5" y="910.0" font-size="11.0" fill="#333333">To take the network down, we'd need to hit them all. At the same time.</text>
<text x="759.0" y="823.0" text-anchor="end" font-size="12" font-weight="bold" fill="#888888" opacity="0.6">4</text>
<text x="765.0" y="1165.0" text-anchor="end" font-size="9" fill="#888888" opacity="0.5">MW</text>
