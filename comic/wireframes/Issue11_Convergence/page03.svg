<text x="41.0" y="458.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="472.0" font-size="11.0" fill="#333333">The earliest installations predate our arrival by at least</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">three months. Possibly longer. They were already operating</text>
<text x="41.0" y="500.0" font-size="11.0" fill="#333333">when we crashed.</text>
