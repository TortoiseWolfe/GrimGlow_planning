<text x="323.4" y="148.0" font-size="11.0" fill="#333333">The window's been sealed since my last recon. North approach is cleaner.</text>
<rect x="35.0" y="167.0" width="375.0" height="40.0" rx="6" fill="white" stroke="#2e8b57" stroke-width="1.0" opacity="0.92"/>
