<text x="41.0" y="946.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="41.0" y="960.0" font-size="11.0" fill="#333333">If it fails, scatter. Do not regroup. Find Theodore. He gets you out of the area.</text>
<text x="41.0" y="974.0" font-size="11.0" fill="#333333">Rendezvous at the secondary location — the church basement.</text>
