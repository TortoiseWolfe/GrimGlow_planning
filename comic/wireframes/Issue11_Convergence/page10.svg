<text x="41.0" y="458.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="41.0" y="472.0" font-size="11.0" fill="#333333">Comms check at position. My signal starts the countdown.</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">You will have ninety seconds from the pulse.</text>
<rect x="50.3" y="505.0" width="338.7" height="54.0" rx="6" fill="white" stroke="#b0b0b0" stroke-width="1.0" opacity="0.92"/>
