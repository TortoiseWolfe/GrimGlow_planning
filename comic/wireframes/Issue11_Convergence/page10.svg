<text x="56.3" y="522.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="56.3" y="536.0" font-size="11.0" fill="#333333">If anyone is compromised, call it. We adapt. We do not</text>
<text x="56.3" y="550.0" font-size="11.0" fill="#333333">abort.</text>
