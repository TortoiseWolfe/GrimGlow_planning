<text x="41.0" y="846.0" font-size="11.0" fill="#333333">Extraction routes. Each operator returns to camp independently. Different routes,</text>
<text x="41.0" y="860.0" font-size="11.0" fill="#333333">staggered timing. If the operation succeeds, regroup here. If it fails —</text>
