<text x="417.0" y="472.0" font-size="11.0" fill="#333333">Modified for your scale. The display is simplified — green</text>
<text x="417.0" y="486.0" font-size="11.0" fill="#333333">means go, red means stop, the counter shows your window.</text>
<text x="417.0" y="500.0" font-size="11.0" fill="#333333">Theodore, you understand the disarm sequence?</text>
<rect x="411.0" y="519.0" width="350.8" height="54.0" rx="6" fill="white" stroke="#c49a6c" stroke-width="1.0" opacity="0.92"/>
