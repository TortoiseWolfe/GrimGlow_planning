<text x="417.0" y="536.0" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="417.0" y="550.0" font-size="11.0" fill="#333333">Four couplings. Two copper, two insulated. Copper first,</text>
<text x="417.0" y="564.0" font-size="11.0" fill="#333333">then insulated. Counter-clockwise. I've rehearsed it.</text>
