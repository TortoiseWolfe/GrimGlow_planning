<text x="41.0" y="98.0" font-size="11.0" fill="#333333">I mean walk away. Don't come back to the wall gap. Don't look for us. Forget you ever saw lights in the rain gutter. Go back</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">to Cribbage's shop and fix clocks and be — be ordinary.</text>
