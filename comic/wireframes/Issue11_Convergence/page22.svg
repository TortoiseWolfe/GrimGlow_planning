<text x="41.0" y="458.0" font-size="11.0" fill="#999999" font-weight="700">MACHEN</text>
<text x="41.0" y="472.0" font-size="11.0" fill="#333333">'In the matter of these recent accounts, there is a pattern which defies the ordinary mechanisms of folk narrative. These are</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">not stories inherited from grandmothers. They are stories being told now, by witnesses who are, by all accounts, credible.'</text>
