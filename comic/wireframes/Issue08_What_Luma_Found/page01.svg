<text x="41.0" y="458.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="472.0" font-size="11.0" fill="#333333">The glyph I found on the Clerkenwell wall is not isolated.</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">I've identified eleven more across a two-mile radius. All</text>
<text x="41.0" y="500.0" font-size="11.0" fill="#333333">in fairy geometric script. All carved, not projected —</text>
<text x="41.0" y="514.0" font-size="11.0" fill="#333333">someone used a physical tool.</text>
