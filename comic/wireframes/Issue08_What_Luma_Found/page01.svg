<text x="41.0" y="832.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="846.0" font-size="11.0" fill="#333333">The oldest glyph dates to approximately the fourteenth century. The newest — my</text>
<text x="41.0" y="860.0" font-size="11.0" fill="#333333">original find — is perhaps sixty years old. Someone was here before us, Captain.</text>
<text x="41.0" y="874.0" font-size="11.0" fill="#333333">Possibly more than one operative. Over a span of five hundred years.</text>
