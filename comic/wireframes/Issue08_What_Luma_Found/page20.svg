<text x="41.0" y="846.0" font-size="11.0" fill="#5a4a30" font-style="italic">The word would not leave her. Carved in stone, older than the church, older than the city's memory. A single instruction from</text>
<text x="41.0" y="860.0" font-size="11.0" fill="#5a4a30" font-style="italic">someone who had stood where she stood, seen what she had seen, and made a choice that consumed their life.</text>
