<text x="417.0" y="846.0" font-size="11.0" fill="#5a4a30" font-style="italic">True. All of it true. But not what anyone thought it meant.</text>
<rect x="411.0" y="859.0" width="292.8" height="68.0" rx="2" fill="#f5ecd8" stroke="#c8b898" stroke-width="0.8" opacity="0.92"/>
