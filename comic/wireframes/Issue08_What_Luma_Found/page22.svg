<text x="417.0" y="890.0" font-size="11.0" fill="#5a4a30" font-style="italic">Beneath the altar, beneath the stone, beneath the dust of</text>
<text x="417.0" y="904.0" font-size="11.0" fill="#5a4a30" font-style="italic">six hundred years — a word carved in light waited for the</text>
<text x="417.0" y="918.0" font-size="11.0" fill="#5a4a30" font-style="italic">next one who would understand.</text>
