<text x="417.0" y="846.0" font-size="11.0" fill="#333333">I've known Will Granger since I was small. He's a good</text>
<text x="417.0" y="860.0" font-size="11.0" fill="#333333">fitter. But he's not... he's not a scholar.</text>
