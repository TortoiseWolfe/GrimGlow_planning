<text x="417.0" y="418.6" font-size="11.0" fill="#5a4a30" font-style="italic">It wasn't the dark that kept him awake. It wasn't the</text>
<text x="417.0" y="432.6" font-size="11.0" fill="#5a4a30" font-style="italic">stories about the Tall Ones.</text>
<rect x="411.0" y="445.6" width="292.8" height="54.0" rx="2" fill="#f5ecd8" stroke="#c8b898" stroke-width="0.8" opacity="0.92"/>
<text x="417.0" y="462.6" font-size="11.0" fill="#5a4a30" font-style="italic" font-weight="500">CAPTION</text>
<text x="417.0" y="476.6" font-size="11.0" fill="#5a4a30" font-style="italic">It was the look on Luma's face when she came up from the</text>
<text x="417.0" y="490.6" font-size="11.0" fill="#5a4a30" font-style="italic">cellar. She had been afraid. And Luma was never afraid.</text>
