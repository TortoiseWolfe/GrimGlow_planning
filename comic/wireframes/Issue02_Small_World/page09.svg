<text x="417.0" y="846.0" font-size="11.0" fill="#5a4a30" font-style="italic">Five figures crossing a barred sky. Below, the Clerkenwell</text>
<text x="417.0" y="860.0" font-size="11.0" fill="#5a4a30" font-style="italic">sewer rushes toward the Fleet Ditch at four knots. They'll</text>
