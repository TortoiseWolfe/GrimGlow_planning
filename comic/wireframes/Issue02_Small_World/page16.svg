<text x="41.0" y="458.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="472.0" font-size="11.0" fill="#333333">Wren, look at this. They mix animal hair into their plaster. Horsehair. For tensile strength. It's... it's brilliant,</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">actually.</text>
