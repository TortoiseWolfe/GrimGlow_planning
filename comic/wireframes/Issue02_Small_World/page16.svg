<text x="41.0" y="572.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="586.0" font-size="11.0" fill="#333333">They solved a materials science problem with biology. Without any computational modelling. Just trial and error over</text>
<text x="41.0" y="600.0" font-size="11.0" fill="#333333">generations.</text>
