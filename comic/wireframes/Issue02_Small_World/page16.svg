<text x="41.0" y="832.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="846.0" font-size="11.0" fill="#333333">Sable. There's a gas supply pipe running through our wall. Iron. Town gas — coal</text>
<text x="41.0" y="860.0" font-size="11.0" fill="#333333">gas, hydrogen, carbon monoxide.</text>
<rect x="35.0" y="879.0" width="481.8" height="54.0" rx="6" fill="white" stroke="#6a5acd" stroke-width="1.0" opacity="0.92"/>
