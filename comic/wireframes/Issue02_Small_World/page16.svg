<text x="41.0" y="960.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="41.0" y="974.0" font-size="11.0" fill="#333333">Can we seal it?</text>
<rect x="35.0" y="993.0" width="481.8" height="54.0" rx="6" fill="white" stroke="#6a5acd" stroke-width="1.0" opacity="0.92"/>
