<text x="544.8" y="844.0" font-size="10.0" fill="#5a4a30" font-style="italic">The city wanted to kill them a hundred</text>
<text x="544.8" y="857.0" font-size="10.0" fill="#5a4a30" font-style="italic">different ways. Most of them were quiet.</text>
