<text x="41.0" y="1010.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="1024.0" font-size="11.0" fill="#333333">I can monitor it. Wren can patch the joint when she has time. For now, we need</text>
<text x="41.0" y="1038.0" font-size="11.0" fill="#333333">ventilation — keep the entrance gap clear.</text>
