<line x1="179.1" y1="933.0" x2="188.1" y2="933.0" stroke="white" stroke-width="1.5"/>
<text x="41.0" y="896.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="910.0" font-size="11.0" fill="#333333">There's a seep at the upper joint. Slow, but if it accumulates in this enclosed</text>
<text x="41.0" y="924.0" font-size="11.0" fill="#333333">space...</text>
<rect x="35.0" y="943.0" width="102.8" height="40.0" rx="6" fill="white" stroke="#b0b0b0" stroke-width="1.0" opacity="0.92"/>
