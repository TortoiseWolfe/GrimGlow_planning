<text x="41.0" y="832.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="41.0" y="846.0" font-size="11.0" fill="#333333">Four components. Four operations. We'll plan each one,</text>
<text x="41.0" y="860.0" font-size="11.0" fill="#333333">execute it clean, and bring what Wren needs.</text>
