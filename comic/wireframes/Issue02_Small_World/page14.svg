<text x="41.0" y="896.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="41.0" y="910.0" font-size="11.0" fill="#333333">But first — we need a base. Somewhere hidden, defensible,</text>
<text x="41.0" y="924.0" font-size="11.0" fill="#333333">close to the wreckage. Tonight, we dig in.</text>
