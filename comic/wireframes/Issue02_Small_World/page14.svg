<text x="41.0" y="84.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">The core works. It just needs a new drive assembly to channel it. I can build one — but not from nothing.</text>
<rect x="311.3" y="117.0" width="453.7" height="40.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
