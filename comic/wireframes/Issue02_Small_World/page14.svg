<text x="41.0" y="458.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="472.0" font-size="11.0" fill="#333333">One: a precision gear assembly. Clockwork quality — the finest they make. Two: copper induction coils. Tightly wound,</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">consistent gauge. Three: an optical lens. Glass, ground to specification. Four: conductor wire. Copper or silver, as thin as</text>
<text x="41.0" y="500.0" font-size="11.0" fill="#333333">they have.</text>
<rect x="238.8" y="519.0" width="526.2" height="40.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="396.6,559.0 404.6,559.0 393.6,567.0" fill="white" stroke="#c87533" stroke-width="0.8"/>
<line x1="396.1" y1="559.0" x2="405.1" y2="559.0" stroke="white" stroke-width="1.5"/>
<text x="244.8" y="536.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="244.8" y="550.0" font-size="11.0" fill="#333333">Each one exists somewhere in this city. Each one means going out there and taking it.</text>
