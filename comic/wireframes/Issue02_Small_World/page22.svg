<text x="41.0" y="458.0" font-size="11.0" fill="#999999" font-weight="700">HOBDAY</text>
<text x="41.0" y="472.0" font-size="11.0" fill="#333333">Small lights. Blue, mostly. But coloured, too — green,</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">copper, red. Moving together, like... like a patrol. In</text>
<text x="41.0" y="500.0" font-size="11.0" fill="#333333">formation.</text>
