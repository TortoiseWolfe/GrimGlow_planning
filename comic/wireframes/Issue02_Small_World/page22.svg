<text x="41.0" y="98.0" font-size="11.0" fill="#333333">I'm telling you, I saw them. Night before last, in the gutter on Saffron Hill. Lights. Not reflections, not gas — lights that</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">moved.</text>
