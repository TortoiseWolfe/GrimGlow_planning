<text x="417.0" y="472.0" font-size="11.0" fill="#5a4a30" font-style="italic">They ran dark. No wing-light, no scanner glow, no</text>
<text x="417.0" y="486.0" font-size="11.0" fill="#5a4a30" font-style="italic">holographic trace. Four-inch shadows on a stone pier,</text>
<text x="417.0" y="500.0" font-size="11.0" fill="#5a4a30" font-style="italic">moving fast, moving silent.</text>
<rect x="411.0" y="513.0" width="292.8" height="54.0" rx="2" fill="#f5ecd8" stroke="#c8b898" stroke-width="0.8" opacity="0.92"/>
