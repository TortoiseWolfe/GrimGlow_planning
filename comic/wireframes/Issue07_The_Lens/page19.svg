<text x="417.0" y="544.0" font-size="11.0" fill="#5a4a30" font-style="italic">Running from something across a river. Something that might</text>
<text x="417.0" y="558.0" font-size="11.0" fill="#5a4a30" font-style="italic">not have noticed them. Something that felt like it had.</text>
