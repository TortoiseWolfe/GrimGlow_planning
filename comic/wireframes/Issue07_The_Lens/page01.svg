<text x="41.0" y="458.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="472.0" font-size="11.0" fill="#333333">We swap the Fresnel lens for a replacement. Same focal</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">length, same mounting. The keeper never knows.</text>
<rect x="44.2" y="505.0" width="344.8" height="54.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="147.7,559.0 155.7,559.0 144.7,567.0" fill="white" stroke="#c87533" stroke-width="0.8"/>
<line x1="147.2" y1="559.0" x2="156.2" y2="559.0" stroke="white" stroke-width="1.5"/>
<text x="50.2" y="522.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="50.2" y="536.0" font-size="11.0" fill="#333333">The Fresnel is military-grade optics — precision-ground</text>
<text x="50.2" y="550.0" font-size="11.0" fill="#333333">glass I need for the temporal drive's alignment array.</text>
