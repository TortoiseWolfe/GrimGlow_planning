<text x="417.0" y="572.0" font-size="11.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="417.0" y="586.0" font-size="11.0" fill="#333333">Pattern?</text>
<rect x="411.0" y="605.0" width="350.8" height="54.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="516.2,659.0 524.2,659.0 513.2,667.0" fill="white" stroke="#c87533" stroke-width="0.8"/>
<line x1="515.7" y1="659.0" x2="524.7" y2="659.0" stroke="white" stroke-width="1.5"/>
<text x="417.0" y="622.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="417.0" y="636.0" font-size="11.0" fill="#333333">Clockwork. He checks the lamp every two hours. We have a</text>
<text x="417.0" y="650.0" font-size="11.0" fill="#333333">ninety-minute window between rounds.</text>
