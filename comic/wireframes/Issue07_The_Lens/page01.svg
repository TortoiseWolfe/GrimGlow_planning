<text x="544.8" y="940.0" font-size="10.0" fill="#2e8b57" font-weight="700">JINK</text>
<text x="544.8" y="953.0" font-size="10.0" fill="#333333">He shouldn't be alone in unfamiliar</text>
<text x="544.8" y="966.0" font-size="10.0" fill="#333333">territory. I'm the scout. Let me scout.</text>
