<text x="41.0" y="84.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">The target is a precision Fresnel lens. River lighthouse, south bank. And before anyone asks — no, we can't just take it.</text>
<rect x="686.5" y="117.0" width="78.6" height="40.0" rx="6" fill="white" stroke="#2e8b57" stroke-width="1.0" opacity="0.92"/>
<polygon points="710.0,157.0 718.0,157.0 707.0,165.0" fill="white" stroke="#2e8b57" stroke-width="0.8"/>
<line x1="709.5" y1="157.0" x2="718.5" y2="157.0" stroke="white" stroke-width="1.5"/>
<text x="692.5" y="134.0" font-size="11.0" fill="#2e8b57" font-weight="700">JINK</text>
<text x="692.5" y="148.0" font-size="11.0" fill="#333333">Since when?</text>
<rect x="35.0" y="167.0" width="272.2" height="40.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="116.6,207.0 124.6,207.0 113.6,215.0" fill="white" stroke="#c87533" stroke-width="0.8"/>
