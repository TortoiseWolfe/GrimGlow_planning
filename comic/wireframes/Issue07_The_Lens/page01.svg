<text x="41.0" y="832.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="846.0" font-size="11.0" fill="#333333">This is a two-phase operation. Theodore acquires the replacement lens during the</text>
<text x="41.0" y="860.0" font-size="11.0" fill="#333333">day. Standard commercial purchase — a boy buying glass for his master. Nothing</text>
<text x="41.0" y="874.0" font-size="11.0" fill="#333333">suspicious.</text>
<rect x="35.0" y="893.0" width="481.8" height="54.0" rx="6" fill="white" stroke="#c87533" stroke-width="1.0" opacity="0.92"/>
<polygon points="179.6,947.0 187.6,947.0 176.6,955.0" fill="white" stroke="#c87533" stroke-width="0.8"/>
<line x1="179.1" y1="947.0" x2="188.1" y2="947.0" stroke="white" stroke-width="1.5"/>
<text x="41.0" y="910.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="924.0" font-size="11.0" fill="#333333">We stage at the waterfront at dusk. Infiltrate after the keeper's first midnight</text>
<text x="41.0" y="938.0" font-size="11.0" fill="#333333">round. Swap. Extract. Done before the two o'clock check.</text>
<text x="510.8" y="823.0" text-anchor="end" font-size="12" font-weight="bold" fill="#888888" opacity="0.6">4</text>
<text x="516.8" y="1165.0" text-anchor="end" font-size="9" fill="#888888" opacity="0.5">MW</text>
