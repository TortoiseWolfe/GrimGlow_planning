<text x="649.0" y="892.0" font-size="10.0" fill="#b0b0b0" font-weight="700">SABLE</text>
<text x="649.0" y="905.0" font-size="10.0" fill="#333333">That wasn't part of—</text>
<rect x="538.8" y="924.0" width="226.2" height="51.0" rx="6" fill="white" stroke="#2e8b57" stroke-width="1.0" opacity="0.92"/>
