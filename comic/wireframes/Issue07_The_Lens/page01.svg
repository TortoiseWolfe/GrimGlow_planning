<text x="417.0" y="508.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="417.0" y="522.0" font-size="11.0" fill="#333333">Single keeper. Night shift. He tends the lamp and sleeps in</text>
<text x="417.0" y="536.0" font-size="11.0" fill="#333333">the watch room below.</text>
<rect x="411.0" y="555.0" width="62.0" height="40.0" rx="6" fill="white" stroke="#b0b0b0" stroke-width="1.0" opacity="0.92"/>
<polygon points="429.6,595.0 437.6,595.0 426.6,603.0" fill="white" stroke="#b0b0b0" stroke-width="0.8"/>
