<text x="544.8" y="844.0" font-size="10.0" fill="#333333">I'll go with Theodore. For the daytime</text>
<text x="544.8" y="857.0" font-size="10.0" fill="#333333">run.</text>
<rect x="643.0" y="876.0" width="122.0" height="38.0" rx="6" fill="white" stroke="#b0b0b0" stroke-width="1.0" opacity="0.92"/>
