<text x="417.0" y="84.0" font-size="11.0" fill="#c49a6c" font-weight="700">THEODORE</text>
<text x="417.0" y="98.0" font-size="11.0" fill="#333333">I've got a room upstairs, yeah. Mr. Cribbage goes home to</text>
<text x="417.0" y="112.0" font-size="11.0" fill="#333333">his own lodgings in the evening. I lock up. Most nights I'm</text>
<text x="417.0" y="126.0" font-size="11.0" fill="#333333">on my own from six o'clock on.</text>
