<text x="41.0" y="472.0" font-size="11.0" fill="#333333">The assembly sits inside the pendulum clock's gear train.</text>
<text x="41.0" y="486.0" font-size="11.0" fill="#333333">Fourth wheel. Sixteen-tooth pinion driving a</text>
<text x="41.0" y="500.0" font-size="11.0" fill="#333333">sixty-four-tooth wheel. It's the most precisely machined</text>
<text x="41.0" y="514.0" font-size="11.0" fill="#333333">component in the shop.</text>
