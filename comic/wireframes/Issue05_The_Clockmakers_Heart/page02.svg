<text x="417.0" y="162.0" font-size="11.0" fill="#333333">If I signal, you walk in and you keep Hoskins occupied. You</text>
<text x="417.0" y="176.0" font-size="11.0" fill="#333333">do not look at our entry point. You do not react to</text>
<text x="417.0" y="190.0" font-size="11.0" fill="#333333">anything you see.</text>
