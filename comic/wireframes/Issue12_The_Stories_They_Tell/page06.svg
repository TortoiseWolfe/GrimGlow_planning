<text x="417.0" y="659.0" font-size="11.0" fill="#333333">The four we disabled were relay nodes. The hub is a</text>
<text x="417.0" y="673.0" font-size="11.0" fill="#333333">telegraph exchange on — &quot; (checks coordinates) &quot; —</text>
<text x="417.0" y="687.0" font-size="11.0" fill="#333333">Bartholomew Lane. The exchange building. And Sable — it's</text>
