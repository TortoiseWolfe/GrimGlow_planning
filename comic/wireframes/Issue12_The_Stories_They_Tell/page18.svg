<text x="41.0" y="84.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">The convergence point isn't technological. It's narrative.</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">What humanity believes about the unknown — about fairies,</text>
<text x="41.0" y="126.0" font-size="11.0" fill="#333333">about monsters, about wonder and fear — shapes the</text>
<text x="41.0" y="140.0" font-size="11.0" fill="#333333">civilization they become. Those beliefs are set here, now,</text>
<text x="41.0" y="154.0" font-size="11.0" fill="#333333">in these stories. Our stories. The mission isn't to change</text>
<text x="41.0" y="168.0" font-size="11.0" fill="#333333">an event. The mission is to be here. To be the fairies in</text>
<text x="41.0" y="182.0" font-size="11.0" fill="#333333">the fairy tales. To be what they see. That's the</text>
<text x="41.0" y="196.0" font-size="11.0" fill="#333333">intervention. That's what 'STAY' means.</text>
<text x="383.0" y="75.0" text-anchor="end" font-size="12" font-weight="bold" fill="#888888" opacity="0.6">1</text>
<text x="389.0" y="604.0" text-anchor="end" font-size="9" fill="#888888" opacity="0.5">MCU</text>
