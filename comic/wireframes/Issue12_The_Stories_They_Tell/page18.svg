<text x="41.0" y="645.0" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="41.0" y="659.0" font-size="11.0" fill="#333333">The telegraph carries stories. Stories shape beliefs. Beliefs shape civilizations.&quot; (A pause.) &quot;I hate that this makes sense.</text>
