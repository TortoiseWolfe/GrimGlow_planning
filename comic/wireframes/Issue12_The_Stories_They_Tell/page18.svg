<text x="417.0" y="84.0" font-size="11.0" fill="#b22222" font-weight="700">THRESH</text>
<text x="417.0" y="98.0" font-size="11.0" fill="#333333">I don't want to stay.&quot; (A beat.) &quot;I'll stay.</text>
