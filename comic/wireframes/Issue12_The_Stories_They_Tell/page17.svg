<text x="417.0" y="84.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="417.0" y="98.0" font-size="11.0" fill="#333333">Prior operatives — at least three deployments over</text>
<text x="417.0" y="112.0" font-size="11.0" fill="#333333">centuries. Each one carved glyphs. Each one left technology</text>
<text x="417.0" y="126.0" font-size="11.0" fill="#333333">behind. Each one stayed. They didn't fail to leave. They</text>
<text x="417.0" y="140.0" font-size="11.0" fill="#333333">chose to stay.</text>
<text x="759.0" y="75.0" text-anchor="end" font-size="12" font-weight="bold" fill="#888888" opacity="0.6">2</text>
<text x="765.0" y="523.9" text-anchor="end" font-size="9" fill="#888888" opacity="0.5">MCU</text>
