<line x1="516.7" y1="615.9" x2="525.7" y2="615.9" stroke="white" stroke-width="1.5"/>
<text x="417.0" y="564.9" font-size="11.0" fill="#c87533" font-weight="700">WREN</text>
<text x="417.0" y="578.9" font-size="11.0" fill="#333333">Stories don't build civilizations, Luma. Technology does.</text>
<text x="417.0" y="592.9" font-size="11.0" fill="#333333">Infrastructure. The telegraph doesn't care about fairy</text>
<text x="417.0" y="606.9" font-size="11.0" fill="#333333">tales.</text>
<rect x="411.0" y="625.9" width="354.0" height="96.0" rx="6" fill="white" stroke="#6a5acd" stroke-width="1.0" opacity="0.92"/>
<polygon points="517.2,721.9 525.2,721.9 514.2,729.9" fill="white" stroke="#6a5acd" stroke-width="0.8"/>
<line x1="516.7" y1="721.9" x2="525.7" y2="721.9" stroke="white" stroke-width="1.5"/>
<text x="417.0" y="642.9" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="417.0" y="656.9" font-size="11.0" fill="#333333">The telegraph carries information that shapes what people</text>
<text x="417.0" y="670.9" font-size="11.0" fill="#333333">believe. You proved that yourself — the Titan devices were</text>
<text x="417.0" y="684.9" font-size="11.0" fill="#333333">steering human development through the stories the</text>
<text x="417.0" y="698.9" font-size="11.0" fill="#333333">telegraph transmitted. The medium shapes the message. The</text>
<text x="417.0" y="712.9" font-size="11.0" fill="#333333">message shapes the civilization.</text>
