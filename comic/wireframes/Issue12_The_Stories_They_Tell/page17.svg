<text x="41.0" y="564.9" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="578.9" font-size="11.0" fill="#333333">And everywhere they went, stories followed. Humans saw</text>
<text x="41.0" y="592.9" font-size="11.0" fill="#333333">them. Told stories about them. Published them. The fairy</text>
<text x="41.0" y="606.9" font-size="11.0" fill="#333333">tales aren't incidental. They're the record. They're what</text>
<text x="41.0" y="620.9" font-size="11.0" fill="#333333">persists.</text>
<text x="383.0" y="555.9" text-anchor="end" font-size="12" font-weight="bold" fill="#888888" opacity="0.6">3</text>
<text x="389.0" y="844.4" text-anchor="end" font-size="9" fill="#888888" opacity="0.5">MCU</text>
