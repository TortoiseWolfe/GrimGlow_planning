<text x="41.0" y="84.0" font-size="11.0" fill="#6a5acd" font-weight="700">LUMA</text>
<text x="41.0" y="98.0" font-size="11.0" fill="#333333">This is everything. Every glyph. Every trace. Every story.</text>
<text x="41.0" y="112.0" font-size="11.0" fill="#333333">I've mapped them.</text>
