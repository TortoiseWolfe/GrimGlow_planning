<text x="542.3" y="657.0" font-size="10.0" fill="#333333">I'm building a talk-through. Theodore,</text>
<text x="542.3" y="670.0" font-size="10.0" fill="#333333">when you get there — it's like a</text>
<text x="542.3" y="683.0" font-size="10.0" fill="#333333">clockwork mechanism, but instead of gears</text>
<text x="542.3" y="696.0" font-size="10.0" fill="#333333">there are crystalline nodes. Same logic.</text>
<text x="542.3" y="709.0" font-size="10.0" fill="#333333">Connection and disconnection. Your hands</text>
<text x="542.3" y="722.0" font-size="10.0" fill="#333333">know this.</text>
